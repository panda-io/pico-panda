name: pico-panda
version: 0.1.0

deps:
  - git@github.com:panda-io/micro-panda-gfx.git@latest

targets:
  ppd:
    entry: ppd
    src: src/
    type: bin
    flags: [HOSTED]
    output: bin/ppd
    test: test/
    cc:
      bin: gcc
      flags: [-O2, -Wall, -Isrc]

  panda:
    entry: panda
    src: src/
    type: bin
    flags: [HOSTED]
    output: bin/panda
    cc:
      bin: gcc
      flags: [-O2, -Wall, -Isrc, -I/opt/homebrew/include, -L/opt/homebrew/lib, -lSDL2]
