name: pico-panda
version: 0.1.0

src: src/
out: out/
test: test/

targets:
  test:
    entry: main
    platform: linux-x64
    cc: gcc
    cflags: [-g, -O0, -Wall]
    flags: [DEBUG, HOSTED]
    output: bin/vm_test
  ppd:
    entry: ppd
    platform: linux-x64
    cc: gcc
    cflags: [-O2, -Wall, -Isrc]
    flags: [HOSTED]
    output: bin/ppd
